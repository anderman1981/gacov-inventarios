name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging, 'feature/**', 'fix/**', 'hotfix/**']
  pull_request:
    branches: [main, develop, staging]

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # JOB 1: Análisis Estático (Linting)
  # ============================================
  lint:
    name: PHP Lint & Style Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, xml, mbstring, zip, gd
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-scripts

      - name: PHP Syntax check
        run: find app -name "*.php" -exec php -l {} \; 2>&1 | grep -v "No syntax errors detected" || true

  # ============================================
  # JOB 2: Tests Unitarios y Feature
  # ============================================
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: gacov_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, xml, mbstring, zip, gd

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-scripts

      - name: Copy env file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Create MySQL database
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS gacov_test;"

      - name: Run migrations
        run: php artisan migrate --force

      - name: Seed database
        run: php artisan db:seed --force || true

      - name: Run Tests
        run: php artisan test --without-tty --stop-on-failure

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            ./testdox.html
            ./coverage.xml
          retention-days: 7

  # ============================================
  # JOB 3: Security Audit
  # ============================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-scripts

      - name: Security Audit
        run: |
          composer audit --no-interaction || echo "Audit completed"

  # ============================================
  # JOB 4: Deploy to Staging
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install SSH Key
        uses: webfactory/ssh-access@v1
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}
          ssh-host: ${{ secrets.HOSTINGER_HOST }}

      - name: Deploy to Staging
        run: |
          ssh -p 65002 ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << 'DEPLOY'
            set -e
            
            echo "=== Deploying to Staging ==="
            cd ~/domains/andersonmares.xyz/public_html/staging-gacov
            
            # Pull latest changes
            git pull origin staging
            
            # Install dependencies
            composer install --no-dev --optimize-autoloader --no-interaction
            
            # Clear cache
            php artisan config:cache 2>/dev/null || true
            php artisan route:cache 2>/dev/null || true
            php artisan view:cache 2>/dev/null || true
            php artisan event:cache 2>/dev/null || true
            
            # Run migrations
            php artisan migrate --force
            
            # Sync permissions
            php artisan permissions:sync 2>/dev/null || true
            
            echo "=== Staging deployed successfully ==="
          DEPLOY

      - name: Notify Success
        run: |
          echo "✅ Staging deployed successfully"
          echo "URL: https://staging-gacov.andersonmares.xyz"

  # ============================================
  # JOB 5: Deploy to Production (only main)
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://gacov.andersonmares.xyz
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install SSH Key
        uses: webfactory/ssh-access@v1
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}
          ssh-host: ${{ secrets.HOSTINGER_HOST }}

      - name: Deploy to Production
        run: |
          ssh -p 65002 ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << 'DEPLOY'
            set -e
            
            echo "=== Deploying to Production ==="
            cd ~/domains/andersonmares.xyz/public_html/gacov
            
            # Pull latest changes
            git pull origin main
            
            # Install dependencies
            composer install --no-dev --optimize-autoloader --no-interaction
            
            # Clear cache
            php artisan config:cache 2>/dev/null || true
            php artisan route:cache 2>/dev/null || true
            php artisan view:cache 2>/dev/null || true
            php artisan event:cache 2>/dev/null || true
            
            # Run migrations
            php artisan migrate --force
            
            # Sync permissions
            php artisan permissions:sync 2>/dev/null || true
            
            echo "=== Production deployed successfully ==="
          DEPLOY

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          draft: true
          prerelease: false

      - name: Notify Success
        run: |
          echo "✅ Production deployed successfully"
          echo "URL: https://gacov.andersonmares.xyz"

  # ============================================
  # JOB 6: Update GitHub Project
  # ============================================
  update-project:
    name: Update GitHub Project
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    
    steps:
      - name: Update Project Status
        run: |
          echo "Deployment completed. Project updated."
